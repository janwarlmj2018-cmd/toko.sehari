<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#059669">
    <title>TOKO SEHARI - Admin Order Panel</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
            padding-bottom: env(safe-area-inset-bottom, 80px);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding-top: env(safe-area-inset-top, 0px);
        }

        .bottom-nav {
            background: white;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            height: calc(70px + env(safe-area-inset-bottom, 0px));
        }

        .admin-badge { display: none; }
        body.is-admin .admin-badge { display: inline-block; }
        
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }

        .product-card { transition: all 0.2s ease; border-radius: 24px; overflow: hidden; border: 1px solid #f3f4f6; }
        .product-card:active { transform: scale(0.98); }

        .nav-item-active { color: #059669 !important; font-weight: 800; }
        .nav-item-inactive { color: #9ca3af; font-weight: 400; }

        .modal-container {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }

        #cart-sidebar {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .upload-area {
            border: 2px dashed #e5e7eb;
            transition: all 0.3s ease;
        }
        .upload-area:hover {
            border-color: #059669;
            background: #f0fdf4;
        }

        /* Order card specific improvements */
        .order-card {
            border-radius: 32px;
            transition: transform 0.2s ease;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900" id="main-body">

    <!-- Auth Screen -->
    <div id="auth-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[1000] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md p-8 rounded-[32px] shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-green-600 rounded-2xl flex items-center justify-center text-white text-3xl mx-auto mb-4 shadow-lg">
                    <i class="fas fa-shopping-basket"></i>
                </div>
                <h2 class="text-3xl font-extrabold text-gray-900">Toko Sehari</h2>
                <p class="text-gray-500 text-sm mt-1">Gunakan <b>admin/admin</b> untuk menguji panel admin</p>
            </div>

            <form id="login-form" class="space-y-4" onsubmit="event.preventDefault(); handleLogin();">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-400 ml-1">USERNAME</label>
                    <input type="text" id="login-id" placeholder="Nama Anda" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-400 ml-1">PASSWORD</label>
                    <input type="password" id="login-pass" placeholder="••••••••" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-400 ml-1">ALAMAT PENGIRIMAN</label>
                    <textarea id="login-address" placeholder="Contoh: Jl. Merdeka No. 10" class="w-full px-5 py-3 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none transition-all h-20 text-sm"></textarea>
                </div>
                <button type="submit" class="w-full py-4 bg-green-600 text-white rounded-2xl font-extrabold shadow-xl shadow-green-100 mt-4 active:scale-95 transition-transform">Masuk</button>
            </form>
        </div>
    </div>

    <!-- Top Navigation -->
    <nav class="glass-nav fixed w-full z-50 top-0">
        <div class="max-w-7xl mx-auto px-5 h-16 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-lg font-black text-green-800 tracking-tight">TOKO SEHARI</span>
                <span class="admin-badge bg-black text-white text-[9px] px-2 py-0.5 rounded-full font-bold uppercase tracking-widest">Admin Access</span>
            </div>
            
            <div class="flex items-center space-x-4">
                <button class="relative p-2 text-gray-700" onclick="toggleCart(true)">
                    <i class="fas fa-shopping-bag text-xl"></i>
                    <span id="cart-count" class="absolute top-0 right-0 bg-red-500 text-white rounded-full text-[9px] w-4 h-4 flex items-center justify-center font-bold">0</span>
                </button>
                <div onclick="showSection('profile')" class="cursor-pointer w-9 h-9 rounded-full bg-green-100 border-2 border-white shadow-sm flex items-center justify-center">
                    <i class="fas fa-user text-green-600 text-xs"></i>
                </div>
            </div>
        </div>
    </nav>

    <main class="min-h-screen pt-16">
        <!-- Katalog Section -->
        <div id="section-katalog" class="section-content pb-24 px-5 max-w-7xl mx-auto">
            <div class="py-6">
                <div class="relative">
                    <input type="text" id="search-input" oninput="renderProducts()" placeholder="Cari barang..." class="w-full pl-12 pr-4 py-4 bg-white border border-gray-100 rounded-2xl shadow-sm focus:ring-2 focus:ring-green-500 outline-none">
                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
            </div>

            <div class="admin-only mb-6 bg-green-50 p-4 rounded-3xl flex items-center justify-between border border-green-100">
                <div>
                    <h3 class="font-bold text-green-900 text-sm">Dashboard Katalog</h3>
                    <p class="text-[10px] text-green-600 font-bold uppercase">Tambah produk via galeri</p>
                </div>
                <button onclick="openProductModal()" class="bg-green-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg shadow-green-200">
                    <i class="fas fa-plus mr-1"></i> Produk
                </button>
            </div>

            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4" id="product-grid"></div>
        </div>

        <!-- Orders Section -->
        <div id="section-orders" class="section-content pb-24 px-5 max-w-3xl mx-auto hidden">
            <div class="py-6 flex justify-between items-end">
                <div>
                    <h2 class="text-2xl font-black text-gray-900">Pesanan</h2>
                    <p class="text-gray-400 text-xs font-bold uppercase tracking-widest" id="order-subtitle">Riwayat</p>
                </div>
                <div class="admin-only">
                   <button onclick="clearAllOrders()" class="text-red-600 text-[10px] font-bold border border-red-100 px-3 py-1 rounded-lg">Bersihkan</button>
                </div>
            </div>
            <div id="orders-list" class="space-y-4"></div>
        </div>

        <!-- Profile Section -->
        <div id="section-profile" class="section-content pb-24 px-5 max-w-3xl mx-auto hidden">
            <div class="bg-white p-8 rounded-[32px] border border-gray-100 text-center mt-6">
                <div class="w-20 h-20 bg-green-50 rounded-full mx-auto mb-4 flex items-center justify-center">
                    <i class="fas fa-user-shield text-3xl text-green-600"></i>
                </div>
                <h3 class="font-black text-xl" id="p-name-display">User</h3>
                <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest mt-1" id="p-role-badge">Status</p>
                <p class="text-gray-500 text-sm mt-2" id="p-address-display"></p>
                
                <div class="mt-8">
                    <button onclick="logout()" class="w-full py-4 bg-gray-50 text-red-600 rounded-2xl font-extrabold text-sm border border-gray-100">Keluar Akun</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <div class="bottom-nav fixed bottom-0 left-0 right-0 z-50 flex items-center justify-around px-2">
        <button onclick="showSection('katalog')" id="nav-katalog" class="flex flex-col items-center justify-center w-full h-full nav-item-active">
            <i class="fas fa-store text-xl mb-1"></i>
            <span class="text-[10px]">Toko</span>
        </button>
        <button onclick="showSection('orders')" id="nav-orders" class="flex flex-col items-center justify-center w-full h-full nav-item-inactive">
            <i class="fas fa-receipt text-xl mb-1"></i>
            <span class="text-[10px]">Pesanan</span>
        </button>
        <button onclick="showSection('profile')" id="nav-profile" class="flex flex-col items-center justify-center w-full h-full nav-item-inactive">
            <i class="fas fa-user-circle text-xl mb-1"></i>
            <span class="text-[10px]">Akun</span>
        </button>
    </div>

    <!-- Product Modal -->
    <div id="product-modal" class="modal-container">
        <div class="bg-white w-full max-w-sm p-8 rounded-[32px] shadow-2xl">
            <h3 class="text-xl font-black mb-6">Produk Baru</h3>
            <form class="space-y-4" onsubmit="event.preventDefault(); saveNewProduct();">
                <div id="upload-container" onclick="document.getElementById('new-p-file').click()" class="upload-area w-full h-36 rounded-2xl flex flex-col items-center justify-center cursor-pointer bg-gray-50 overflow-hidden relative">
                    <img id="img-preview-upload" src="" class="hidden w-full h-full object-cover">
                    <div id="upload-placeholder" class="text-center">
                        <i class="fas fa-image text-gray-300 text-3xl mb-2"></i>
                        <p class="text-[10px] text-gray-400 font-bold uppercase">Ambil dari Galeri</p>
                    </div>
                </div>
                <input type="file" id="new-p-file" accept="image/*" class="hidden" onchange="previewFile(this)">

                <input type="text" id="new-p-name" placeholder="Nama Barang" required class="w-full px-4 py-4 bg-gray-50 border-0 rounded-2xl outline-none focus:ring-2 focus:ring-green-500">
                <input type="number" id="new-p-price" placeholder="Harga" required class="w-full px-4 py-4 bg-gray-50 border-0 rounded-2xl outline-none focus:ring-2 focus:ring-green-500">

                <div class="flex space-x-3 pt-4">
                    <button type="submit" class="flex-1 py-4 bg-green-600 text-white rounded-2xl font-bold">Simpan</button>
                    <button type="button" onclick="closeProductModal()" class="flex-1 py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold">Batal</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Cart Drawer -->
    <div id="cart-overlay" class="fixed inset-0 bg-black/50 z-[100] hidden" onclick="toggleCart(false)"></div>
    <div id="cart-sidebar" class="fixed inset-x-0 bottom-0 bg-white z-[110] transform translate-y-full rounded-t-[40px] flex flex-col max-h-[80vh] shadow-2xl">
        <div class="p-6 flex justify-between items-center border-b border-gray-50">
            <h3 class="text-xl font-black">Keranjang Belanja</h3>
            <button onclick="toggleCart(false)"><i class="fas fa-times-circle text-2xl text-gray-200"></i></button>
        </div>
        <div id="cart-items" class="p-6 flex-1 overflow-y-auto space-y-4"></div>
        <div class="p-8 bg-gray-50">
            <div class="flex justify-between items-center mb-6">
                <span class="text-gray-400 font-bold uppercase text-[10px] tracking-widest">Total Bayar</span>
                <span id="cart-total-text" class="text-2xl font-black text-green-700">Rp 0</span>
            </div>
            <button onclick="processOrder()" id="btn-checkout" class="w-full py-5 bg-green-600 text-white rounded-2xl font-black shadow-xl shadow-green-100">BUAT PESANAN SEKARANG</button>
        </div>
    </div>

    <script>
        let products = JSON.parse(localStorage.getItem('toko_products')) || [
            { id: 1, name: "Beras Pandan Wangi 5kg", price: 85000, img: "https://images.unsplash.com/photo-1586201375761-83865001e31c?w=400" },
            { id: 2, name: "Minyak Goreng 2L", price: 34000, img: "https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?w=400" },
            { id: 3, name: "Telur Ayam 1kg", price: 29000, img: "https://images.unsplash.com/photo-1518569166148-39615cc0f92a?w=400" }
        ];
        let orders = JSON.parse(localStorage.getItem('toko_orders')) || [];
        let cart = [];
        let currentUser = null;
        let uploadedImgBase64 = "";

        function handleLogin() {
            const id = document.getElementById('login-id').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            const address = document.getElementById('login-address').value.trim() || "Alamat tidak diatur";
            
            if (id.toLowerCase() === 'admin' && pass === 'admin') {
                currentUser = { name: 'Admin Utama', role: 'admin', address: 'Pusat Distribusi' };
            } else {
                currentUser = { name: id, role: 'user', address: address };
            }
            localStorage.setItem('toko_session', JSON.stringify(currentUser));
            finalizeLogin();
        }

        function finalizeLogin() {
            document.body.classList.toggle('is-admin', currentUser.role === 'admin');
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('p-name-display').innerText = currentUser.name;
            document.getElementById('p-role-badge').innerText = currentUser.role === 'admin' ? 'Administrator' : 'Pelanggan';
            document.getElementById('p-address-display').innerText = currentUser.address;
            document.getElementById('order-subtitle').innerText = currentUser.role === 'admin' ? 'Daftar Masuk' : 'Riwayat Belanja';
            renderProducts();
            showSection('katalog');
        }

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            const search = document.getElementById('search-input').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(search));
            const isAdmin = currentUser && currentUser.role === 'admin';

            grid.innerHTML = filtered.map(p => `
                <div class="bg-white p-4 product-card flex flex-col h-full shadow-sm">
                    <div class="relative mb-3">
                        <img src="${p.img}" class="h-32 w-full object-cover rounded-2xl" onerror="this.src='https://via.placeholder.com/400x400?text=Produk'">
                        ${isAdmin ? `<button onclick="deleteProduct(${p.id})" class="absolute top-2 right-2 bg-red-500/80 backdrop-blur text-white w-7 h-7 rounded-full flex items-center justify-center text-[10px]"><i class="fas fa-trash"></i></button>` : ''}
                    </div>
                    <h3 class="font-bold text-[12px] flex-1 line-clamp-2 text-gray-800 leading-tight">${p.name}</h3>
                    <p class="text-green-700 font-black mt-2 text-sm">Rp ${p.price.toLocaleString()}</p>
                    <button onclick="addToCart(${p.id})" class="mt-4 w-full bg-green-50 text-green-700 py-2 rounded-xl text-[10px] font-black uppercase tracking-wider active:bg-green-600 active:text-white transition-colors">Beli</button>
                </div>
            `).join('');
        }

        function previewFile(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    uploadedImgBase64 = e.target.result;
                    document.getElementById('img-preview-upload').src = uploadedImgBase64;
                    document.getElementById('img-preview-upload').classList.remove('hidden');
                    document.getElementById('upload-placeholder').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            const ex = cart.find(i => i.id === id);
            if (ex) ex.qty++; else cart.push({ ...p, qty: 1 });
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.reduce((a,b) => a+b.qty, 0);
            let total = 0;
            const container = document.getElementById('cart-items');
            
            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-10"><i class="fas fa-shopping-basket text-gray-100 text-4xl mb-3"></i><p class="text-gray-300 text-xs font-bold uppercase">Kosong</p></div>`;
            } else {
                container.innerHTML = cart.map((item, idx) => {
                    total += (item.price * item.qty);
                    return `
                    <div class="flex items-center space-x-4 bg-gray-50/50 p-4 rounded-3xl border border-gray-50">
                        <img src="${item.img}" class="w-12 h-12 rounded-2xl object-cover bg-white">
                        <div class="flex-1">
                            <p class="font-bold text-[11px] leading-tight text-gray-700">${item.name}</p>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-green-700 font-black text-xs">Rp ${(item.price * item.qty).toLocaleString()}</span>
                                <div class="flex items-center space-x-3 bg-white px-2 py-1 rounded-xl shadow-sm border border-gray-100">
                                    <button onclick="updateCartQty(${idx}, -1)" class="text-gray-300 text-[10px]"><i class="fas fa-minus"></i></button>
                                    <span class="text-xs font-black text-gray-800">${item.qty}</span>
                                    <button onclick="updateCartQty(${idx}, 1)" class="text-gray-300 text-[10px]"><i class="fas fa-plus"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            }
            document.getElementById('cart-total-text').innerText = "Rp " + total.toLocaleString();
        }

        function updateCartQty(idx, d) {
            cart[idx].qty += d;
            if (cart[idx].qty <= 0) cart.splice(idx, 1);
            updateCartUI();
        }

        function toggleCart(open) {
            document.getElementById('cart-sidebar').classList.toggle('translate-y-full', !open);
            document.getElementById('cart-overlay').classList.toggle('hidden', !open);
        }

        function processOrder() {
            if (cart.length === 0) return;
            orders.unshift({
                id: 'INV-' + Date.now(),
                userName: currentUser.name,
                userAddress: currentUser.address,
                date: new Date().toLocaleDateString('id-ID'),
                time: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }),
                items: [...cart],
                total: cart.reduce((a,b) => a+(b.price*b.qty), 0),
                status: 'Menunggu'
            });
            cart = [];
            updateCartUI();
            toggleCart(false);
            localStorage.setItem('toko_orders', JSON.stringify(orders));
            showSection('orders');
        }

        function renderOrders() {
            const list = document.getElementById('orders-list');
            const isAdmin = currentUser.role === 'admin';
            const filtered = isAdmin ? orders : orders.filter(o => o.userName === currentUser.name);
            
            list.innerHTML = filtered.length === 0 ? `<div class="text-center py-20 text-gray-200"><i class="fas fa-box-open text-5xl mb-4"></i><p class="font-bold text-xs">Belum ada pesanan</p></div>` : filtered.map(o => `
                <div class="bg-white p-6 order-card border border-gray-100 shadow-sm relative overflow-hidden">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1 pr-4">
                            ${isAdmin ? 
                                `<div>
                                    <h4 class="text-2xl font-black text-black tracking-tight leading-none">${o.userName}</h4>
                                    <div class="mt-2 flex items-start space-x-2">
                                        <i class="fas fa-map-marker-alt text-red-400 text-[10px] mt-1"></i>
                                        <p class="text-gray-600 text-xs font-semibold leading-relaxed">${o.userAddress}</p>
                                    </div>
                                 </div>` : 
                                `<div>
                                    <h4 class="text-sm font-black text-gray-900">${o.userName}</h4>
                                    <p class="text-[10px] text-gray-400 font-bold mt-1">${o.id}</p>
                                 </div>`
                            }
                        </div>
                        <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest ${o.status === 'Selesai' ? 'bg-green-100 text-green-700' : 'bg-orange-50 text-orange-600'}">${o.status}</span>
                    </div>
                    
                    <div class="space-y-1 py-4 border-y border-gray-50">
                        ${o.items.map(i => `<div class="flex justify-between text-[11px] font-bold text-gray-500"><span>${i.name} (x${i.qty})</span><span>Rp ${(i.price*i.qty).toLocaleString()}</span></div>`).join('')}
                    </div>

                    <div class="flex justify-between items-center pt-5">
                        <div>
                            <p class="text-[9px] font-black text-gray-300 uppercase tracking-widest">Waktu Order: ${o.date} ${o.time}</p>
                            <p class="text-xl font-black text-green-700 mt-1">Rp ${o.total.toLocaleString()}</p>
                        </div>
                        ${isAdmin ? `
                        <div class="flex space-x-2">
                            <button onclick="updateOrderStatus('${o.id}')" class="bg-black text-white px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-wider active:scale-90 transition-transform shadow-lg shadow-black/10">Update</button>
                            <button onclick="deleteOrder('${o.id}')" class="bg-red-50 text-red-500 w-10 h-10 rounded-2xl flex items-center justify-center"><i class="fas fa-trash-alt text-xs"></i></button>
                        </div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function updateOrderStatus(id) {
            const o = orders.find(x => x.id === id);
            const states = ['Menunggu', 'Diproses', 'Selesai'];
            o.status = states[(states.indexOf(o.status) + 1) % states.length];
            localStorage.setItem('toko_orders', JSON.stringify(orders));
            renderOrders();
        }

        function deleteOrder(id) {
            if(confirm("Hapus pesanan ini?")) {
                orders = orders.filter(o => o.id !== id);
                localStorage.setItem('toko_orders', JSON.stringify(orders));
                renderOrders();
            }
        }

        function clearAllOrders() {
            if(confirm("Hapus semua riwayat pesanan?")) {
                orders = [];
                localStorage.setItem('toko_orders', JSON.stringify(orders));
                renderOrders();
            }
        }

        function saveNewProduct() {
            const name = document.getElementById('new-p-name').value;
            const price = parseInt(document.getElementById('new-p-price').value);
            const img = uploadedImgBase64 || "https://via.placeholder.com/400x400?text=Produk";
            products.push({ id: Date.now(), name, price, img });
            localStorage.setItem('toko_products', JSON.stringify(products));
            renderProducts();
            closeProductModal();
        }

        function deleteProduct(id) {
            if(confirm("Hapus produk ini?")) {
                products = products.filter(p => p.id !== id);
                localStorage.setItem('toko_products', JSON.stringify(products));
                renderProducts();
            }
        }

        function showSection(name) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden'));
            document.getElementById(`section-${name}`).classList.remove('hidden');
            document.querySelectorAll('.bottom-nav button').forEach(b => {
                b.classList.remove('nav-item-active');
                b.classList.add('nav-item-inactive');
            });
            document.getElementById(`nav-${name}`).classList.add('nav-item-active');
            if (name === 'orders') renderOrders();
        }

        function openProductModal() { 
            uploadedImgBase64 = "";
            document.getElementById('img-preview-upload').classList.add('hidden');
            document.getElementById('upload-placeholder').classList.remove('hidden');
            document.getElementById('product-modal').style.display = 'flex'; 
        }
        function closeProductModal() { document.getElementById('product-modal').style.display = 'none'; }
        function logout() { localStorage.removeItem('toko_session'); location.reload(); }

        window.onload = () => {
            const session = localStorage.getItem('toko_session');
            if (session) { currentUser = JSON.parse(session); finalizeLogin(); }
        };
    </script>
